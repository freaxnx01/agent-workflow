# markdownlint-cli2 config — companion to the pre-commit template.
# Relaxes rules that fight reference-style docs and excludes files that are
# generated by /sync-ai-instructions (regenerating them is the source of truth,
# so linting the output is noise).
config:
  default: true
  MD013: false   # line length — prose, tables and links run long
  MD033: false   # inline HTML — used for anchors / <details> / comments
  MD041: false   # first line need not be a top-level heading
  MD024:
    siblings_only: true   # repeated headings allowed across different sections
  MD029: false   # ordered-list numbering style is a matter of taste
  MD060: false   # table pipe padding ("compact" style) — too pedantic for prose tables

globs:
  - "**/*.md"

ignores:
  # Git worktrees live under .worktrees/ (gitignored, see CLAUDE.md). The config
  # globs above override any file list passed on the command line, so without
  # this a local run lints every worktree checkout too — hundreds of phantom
  # errors that CI never sees, since a fresh checkout has no worktrees.
  - ".worktrees/**"
  - "CLAUDE.md"
  - "SKILL.md"
  - ".github/copilot-instructions.md"
  - "**/node_modules/**"
  # Superpowers working docs (specs, plans, SDD scratch) are one-time process
  # artifacts, not maintained prose — linting them is noise, same rationale as
  # the generated-file excludes above.
  - "docs/superpowers/**"
