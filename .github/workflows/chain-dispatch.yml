name: Chain Dispatch (reusable)

# Called by a consumer-side trigger workflow when a merged PR closes
# an `ai-implement` issue. Walks the issue's `Blocks:` chain per
# ADR-003 and dispatches any newly-eligible successor.
#
# The consumer-side stub lives in each consumer repo's
# `.github/workflows/chain-dispatch.yml` and triggers on
# `pull_request.closed` with `merged == true`. See
# `docs/CONSUMER-SETUP.md` for the copy-pasteable stub.

on:
  workflow_call:
    inputs:
      closed-pr-number:
        description: PR number whose merge triggered the chain check.
        type: number
        required: true
      max-chain-depth:
        description: |
          Refuse dispatch when the current chain depth reaches this
          cap. Eligible candidates beyond the cap are commented on
          with `decision=capped` and not dispatched. ADR-003 §5.
        type: number
        default: 5
      chain-depth:
        description: |
          Current chain depth. Default 1 (the closed issue is the
          first link). Future revisions will compute this from the
          closed issue's `Blocked by:` predecessor chain.
        type: number
        default: 1
      cooldown-seconds:
        description: |
          Defensive sleep before dispatching successors. Mostly a
          runaway-loop brake. ADR-003 §5.
        type: number
        default: 60
      target-workflow:
        description: |
          The consumer's pipeline workflow file. Eligible successors are
          dispatched via `gh workflow run <target-workflow> -f
          issue-number=<N>`. Default `claude.yml` matches the
          CONSUMER-SETUP.md section 1 stub.
        type: string
        default: claude.yml
      pipeline-repo:
        description: |
          Owner/repo to fetch shared scripts from. Defaults to the
          canonical `freaxnx01/claude-pipeline`.
        type: string
        default: freaxnx01/claude-pipeline
      pipeline-ref:
        description: |
          Ref of `pipeline-repo` to check out. Defaults to `main`.
          Consumers that pin `uses:` to a tag should also pass that
          tag here.
        type: string
        default: main
      local-scripts:
        description: |
          If true, skip cross-repo checkout and mirror the local
          consumer checkout's `scripts/` into `.claude-pipeline/`.
        type: boolean
        default: false
      stub-mode:
        description: |
          Test-only. When `true`, bypasses every real `gh` call:
          prepends `tests/mocks` to PATH so `gh pr view`, `gh issue
          comment`, `gh issue list`, `gh workflow run` all route
          through the mock and are logged. The verify step emits
          `dispatch-attempted=true|false` based on whether a
          `gh workflow run` line appears in the mock log.
        type: boolean
        default: false
      stub-closed-issue:
        description: |
          Test-only. When stub-mode=true, the closed-issue number to
          synthesize (skips `gh pr view` body parsing).
        type: number
        default: 100
      stub-candidates-json:
        description: |
          Test-only. When stub-mode=true, the CANDIDATES_JSON env
          passed straight to find-next-blocked-issue.sh (skips
          `gh issue list`).
        type: string
        default: '[]'
      stub-kill-switch-open:
        description: |
          Test-only. When stub-mode=true, set to true to simulate
          the `ai:chain-paused` issue being open (skips the live
          probe).
        type: boolean
        default: false
      stub-chain-depth:
        description: |
          Test-only. Override CHAIN_DEPTH for the act test fixtures
          that exercise the depth-cap path.
        type: number
        default: 1
    secrets:
      GH_TOKEN:
        description: |
          Token with `issues:read`, `pull-requests:read`, and
          `actions:write` on the consumer repo. The ambient
          GITHUB_TOKEN is sufficient.
        required: true
    outputs:
      successor-count:
        description: Number of eligible successors dispatched.
        value: ${{ jobs.dispatch.outputs.successor-count }}
      successors:
        description: Space-separated list of successor issue numbers.
        value: ${{ jobs.dispatch.outputs.successors }}
      dispatch-attempted:
        description: |
          "true" or "false" — whether `gh workflow run` was invoked.
          Populated only under stub-mode (the act test's assertion
          surface for "no real workflow_run is made"). Empty on
          real runs.
        value: ${{ jobs.dispatch.outputs.dispatch-attempted }}

permissions:
  contents: read

concurrency:
  group: chain-dispatch-${{ github.repository }}-${{ inputs.closed-pr-number }}
  cancel-in-progress: false

jobs:
  dispatch:
    name: Dispatch chain successor for PR #${{ inputs.closed-pr-number }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: read
      pull-requests: read
      actions: write
    outputs:
      successor-count:    ${{ steps.find.outputs.successor-count }}
      successors:         ${{ steps.find.outputs.successors }}
      dispatch-attempted: ${{ steps.verify_mock.outputs.dispatch-attempted }}
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Checkout claude-pipeline scripts
        if: ${{ !inputs.local-scripts }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ inputs.pipeline-repo }}
          ref: ${{ inputs.pipeline-ref }}
          path: .claude-pipeline
          sparse-checkout: |
            scripts
            tests/mocks

      - name: Mirror local scripts to .claude-pipeline (self-test mode)
        if: ${{ inputs.local-scripts }}
        run: |
          mkdir -p .claude-pipeline/scripts .claude-pipeline/tests/mocks
          cp -r scripts/. .claude-pipeline/scripts/
          if [[ -d tests/mocks ]]; then
            cp -r tests/mocks/. .claude-pipeline/tests/mocks/
          fi

      - name: Wire gh mock (test mode)
        if: inputs.stub-mode
        env:
          WORKSPACE: ${{ github.workspace }}
          RUNNER_TEMP_DIR: ${{ runner.temp }}
        run: |
          log="$RUNNER_TEMP_DIR/gh-mock.log"
          : > "$log"
          {
            printf 'PATH=%s/.claude-pipeline/tests/mocks:%s\n' "$WORKSPACE" "$PATH"
            printf 'GH_MOCK_LOG=%s\n' "$log"
          } >> "$GITHUB_ENV"

      - name: Resolve closed issue (stub mode)
        if: inputs.stub-mode
        id: closed_issue_stub
        env:
          STUB_CLOSED: ${{ inputs.stub-closed-issue }}
        run: printf 'closed-issue=%s\n' "$STUB_CLOSED" >> "$GITHUB_OUTPUT"

      - name: Resolve closed issue from the merged PR
        # PR body is untrusted input (a contributor can write anything).
        # We never interpolate it into a command; gh fetches into a
        # shell variable and grep extracts a numeric reference. The
        # extracted `closed` value is then `tr -d '#'`-stripped and
        # used only as a numeric.
        if: ${{ !inputs.stub-mode }}
        id: closed_issue
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ inputs.closed-pr-number }}
        run: |
          body="$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq .body)"
          closed="$(printf '%s' "$body" \
            | grep -ioE '(close[sd]?|fix(e[sd])?|resolve[sd]?)[[:space:]]+#[0-9]+' \
            | head -1 \
            | grep -oE '#[0-9]+' \
            | tr -d '#' || true)"
          if [[ -z "$closed" ]]; then
            printf 'no closing-keyword reference in PR body — chain dispatch skipped\n'
            printf 'closed-issue=\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Defensive: ensure the extracted value is purely numeric.
          if ! [[ "$closed" =~ ^[0-9]+$ ]]; then
            printf 'extracted issue ref is not numeric (%q); refusing\n' "$closed"
            printf 'closed-issue=\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf 'closed-issue=%s\n' "$closed" >> "$GITHUB_OUTPUT"

      - name: Resolve closed-issue seam
        id: closed
        env:
          REAL: ${{ steps.closed_issue.outputs.closed-issue }}
          STUB: ${{ steps.closed_issue_stub.outputs.closed-issue }}
        run: printf 'value=%s\n' "${REAL:-$STUB}" >> "$GITHUB_OUTPUT"

      - name: Find eligible successors
        if: steps.closed.outputs.value != ''
        id: find
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          CLOSED_ISSUE_NUMBER: ${{ steps.closed.outputs.value }}
          MAX_CHAIN_DEPTH: ${{ inputs.max-chain-depth }}
          CHAIN_DEPTH: ${{ inputs.stub-mode && inputs.stub-chain-depth || inputs.chain-depth }}
          CANDIDATES_JSON: ${{ inputs.stub-mode && inputs.stub-candidates-json || '' }}
          KILL_SWITCH_OPEN: ${{ inputs.stub-mode && (inputs.stub-kill-switch-open && 'true' || 'false') || '' }}
        run: bash .claude-pipeline/scripts/find-next-blocked-issue.sh

      - name: Post audit comments (every candidate, every decision)
        # ADR-003: an audit comment goes on every candidate so the
        # decision is visible on the PR/issue even when refused.
        if: steps.closed.outputs.value != ''
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          CLOSED_ISSUE: ${{ steps.closed.outputs.value }}
          DEPTH: ${{ inputs.chain-depth }}
          MAX_DEPTH: ${{ inputs.max-chain-depth }}
          DISPATCHED: ${{ steps.find.outputs.successors }}
          CAPPED: ${{ steps.find.outputs.capped }}
          PAUSED: ${{ steps.find.outputs.paused }}
        run: |
          post() {
            local decision="$1" n="$2"
            if ! [[ "$n" =~ ^[0-9]+$ ]]; then
              printf 'skip-audit: non-numeric candidate %q\n' "$n"
              return 0
            fi
            ISSUE_NUMBER="$n" DECISION="$decision" \
              bash .claude-pipeline/scripts/post-chain-audit.sh
          }
          for n in $DISPATCHED; do post dispatched "$n"; done
          for n in $CAPPED;     do post capped     "$n"; done
          for n in $PAUSED;     do post paused     "$n"; done

      - name: Cooldown before dispatch
        if: |
          steps.closed.outputs.value != ''
          && steps.find.outputs.successor-count != '0'
        env:
          # Under stub-mode the cooldown is forced to 0 so the act
          # test doesn't have to wait the full 60s real default.
          COOLDOWN: ${{ inputs.stub-mode && 0 || inputs.cooldown-seconds }}
        run: |
          printf 'cooldown: sleeping %s seconds before dispatch\n' "$COOLDOWN"
          sleep "$COOLDOWN"

      - name: Dispatch successors
        if: |
          steps.closed.outputs.value != ''
          && steps.find.outputs.successor-count != '0'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          REPO: ${{ github.repository }}
          SUCCESSORS: ${{ steps.find.outputs.successors }}
          TARGET_WORKFLOW: ${{ inputs.target-workflow }}
        run: |
          for n in $SUCCESSORS; do
            if ! [[ "$n" =~ ^[0-9]+$ ]]; then
              printf 'skipping non-numeric successor: %q\n' "$n"
              continue
            fi
            printf 'dispatching: gh workflow run %s -f issue-number=%s\n' \
              "$TARGET_WORKFLOW" "$n"
            gh workflow run "$TARGET_WORKFLOW" \
              --repo "$REPO" \
              -f "issue-number=$n"
          done

      - name: Verify gh mock log (test mode)
        # Under stub-mode, inspect $GH_MOCK_LOG for a `workflow run`
        # line and emit `dispatch-attempted=true|false`. The act test
        # asserts on this — see chain-dispatch.test.yml.
        if: inputs.stub-mode && always()
        id: verify_mock
        run: |
          log="${GH_MOCK_LOG:-}"
          if [[ -n "$log" && -r "$log" ]] && grep -qE '^workflow run ' "$log"; then
            attempted=true
          else
            attempted=false
          fi
          printf 'dispatch-attempted=%s\n' "$attempted" >> "$GITHUB_OUTPUT"
          printf 'gh-mock log contents:\n'
          [[ -r "$log" ]] && cat "$log" || printf '(empty or unreadable)\n'
