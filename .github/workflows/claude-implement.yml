name: Claude Implement (reusable, DEPRECATED)

# DEPRECATED COMPATIBILITY SHIM — do not add logic here.
#
# The reusable workflow was renamed `claude-implement.yml` → `agent-implement.yml`
# as part of the claude→agent rename. This file is kept only so consumers still
# pinning
#   uses: freaxnx01/agent-workflow/.github/workflows/claude-implement.yml@v1
# keep loading instead of hard-failing with "workflow not found". It forwards
# every input, secret, and output verbatim to `agent-implement.yml` and adds no
# behaviour of its own (`uses: ./...` resolves against this repo+ref, so an
# `@v1` caller transparently runs the v1 `agent-implement.yml`).
#
# Migrate the `uses:` path to `agent-implement.yml` (identical interface); this
# shim is removed at the next major (v2). Keep this input/secret/output list in
# lockstep with agent-implement.yml until then.
#
# No top-level `permissions:` block on purpose: a pass-through must not cap the
# permissions the consumer granted, or the downstream jobs lose the write scopes
# they need (CONSUMER-SETUP.md gotcha #5).

on:
  workflow_call:
    inputs:
      issue-number:
        type: number
        required: true
      runner-labels:
        type: string
        default: '["ubuntu-latest"]'
      default-model:
        type: string
        default: claude-sonnet-5
      agent:
        type: string
        default: claude
      timeout-minutes:
        type: number
        default: 30
      pipeline-repo:
        type: string
        # Transitional: freaxnx01/agent-workflow doesn't exist on GitHub until
        # the rename lands (ADR-006) — actions/checkout would fail against it.
        # Flip to freaxnx01/agent-workflow once the rename is verified.
        default: freaxnx01/agent-pipeline
      pipeline-ref:
        type: string
        default: main
      dry-run:
        type: boolean
        default: false
      local-scripts:
        type: boolean
        default: false
      stub-claude:
        type: boolean
        default: false
      stub-fixture:
        type: string
        default: success
      stub-auto-review-enabled:
        type: boolean
        default: false
      stub-pre-preview-enabled:
        type: boolean
        default: false
      stub-review-verdict:
        type: string
        default: ''
      stub-pr-files:
        type: string
        default: ''
      attempt:
        type: number
        default: 1
      auto-review:
        type: boolean
        default: false
      pre-preview:
        type: boolean
        default: false
      pipeline-author-allowlist:
        type: string
        default: 'github-actions[bot]'
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      OPENROUTER_API_KEY:
        required: false
      PIPELINE_APP_ID:
        required: false
      PIPELINE_APP_PRIVATE_KEY:
        required: false
    outputs:
      outcome:
        value: ${{ jobs.forward.outputs.outcome }}
      cost-usd:
        value: ${{ jobs.forward.outputs.cost-usd }}
      num-turns:
        value: ${{ jobs.forward.outputs.num-turns }}
      failure-class:
        value: ${{ jobs.forward.outputs.failure-class }}
      retry-decision:
        value: ${{ jobs.forward.outputs.retry-decision }}
      auto-review-enabled:
        value: ${{ jobs.forward.outputs.auto-review-enabled }}
      auto-review-merge-attempted:
        value: ${{ jobs.forward.outputs.auto-review-merge-attempted }}
      pre-preview-merge-attempted:
        value: ${{ jobs.forward.outputs.pre-preview-merge-attempted }}
      pre-preview-ready-attempted:
        value: ${{ jobs.forward.outputs.pre-preview-ready-attempted }}

jobs:
  forward:
    name: Forward to agent-implement.yml
    uses: ./.github/workflows/agent-implement.yml
    with:
      issue-number: ${{ inputs.issue-number }}
      runner-labels: ${{ inputs.runner-labels }}
      default-model: ${{ inputs.default-model }}
      agent: ${{ inputs.agent }}
      timeout-minutes: ${{ inputs.timeout-minutes }}
      pipeline-repo: ${{ inputs.pipeline-repo }}
      pipeline-ref: ${{ inputs.pipeline-ref }}
      dry-run: ${{ inputs.dry-run }}
      local-scripts: ${{ inputs.local-scripts }}
      stub-claude: ${{ inputs.stub-claude }}
      stub-fixture: ${{ inputs.stub-fixture }}
      stub-auto-review-enabled: ${{ inputs.stub-auto-review-enabled }}
      stub-pre-preview-enabled: ${{ inputs.stub-pre-preview-enabled }}
      stub-review-verdict: ${{ inputs.stub-review-verdict }}
      stub-pr-files: ${{ inputs.stub-pr-files }}
      attempt: ${{ inputs.attempt }}
      auto-review: ${{ inputs.auto-review }}
      pre-preview: ${{ inputs.pre-preview }}
      pipeline-author-allowlist: ${{ inputs.pipeline-author-allowlist }}
    secrets: inherit
