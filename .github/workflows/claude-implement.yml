name: Claude Implement (reusable)

on:
  workflow_call:
    inputs:
      issue-number:
        description: GitHub issue number this run is implementing.
        type: number
        required: true
      runner-labels:
        description: JSON array of runner labels (e.g. '["ubuntu-latest"]').
        type: string
        default: '["ubuntu-latest"]'
      default-model:
        description: Model used when no `model:*` label is present on the issue.
        type: string
        default: claude-opus-4-7
      timeout-minutes:
        description: Hard cap on the implementation job runtime.
        type: number
        default: 30
      pipeline-repo:
        description: |
          Owner/repo for the claude-pipeline checkout that supplies shared
          scripts. Defaults to the canonical 'freaxnx01/claude-pipeline'.
          Override only for self-tests (the test workflow points this at the
          repo currently being PR-tested so it works on fork PRs and act).
        type: string
        default: freaxnx01/claude-pipeline
      pipeline-ref:
        description: |
          Ref of `pipeline-repo` to check out for shared scripts. Defaults
          to `main`. NOTE: GitHub's `github.workflow_sha`/`workflow_ref`
          context fields refer to the *caller's* workflow when running as
          a reusable workflow, so we cannot auto-resolve to the same ref
          the caller pinned in `uses:`. Consumers that pin to a tag (e.g.
          `uses: ...@v1`) should also pass `pipeline-ref: v1` here to keep
          workflow and scripts in lockstep.
        type: string
        default: main
      dry-run:
        description: |
          If true, skip GitHub API side effects in the report step (no issue
          comment, no label changes). Used by `claude-implement.test.yml` under
          act, and as a manual escape hatch for inspection-only runs.
        type: boolean
        default: false
      local-scripts:
        description: |
          If true, skip the cross-repo checkout of `pipeline-repo` and instead
          mirror the consumer checkout's `scripts/` and `tests/mocks/` into
          `.claude-pipeline/`. Use for self-tests under act (where the SHA
          isn't on the canonical remote yet) or for monorepo consumers where
          pipeline scripts live in the same repo.
        type: boolean
        default: false
      stub-claude:
        description: |
          If true, skip the real Claude action and synthesize a canned result
          (see `stub-fixture`). Used by claude-implement.test.yml under act
          (no valid token) and as a manual diagnostic for the surrounding wiring.
        type: boolean
        default: false
      stub-fixture:
        description: |
          When `stub-claude: true`, picks which canned outcome the stub should
          synthesize: success | rate_limit | task_failure. Used to exercise the
          classify-failure + retry-dispatch branch under act without burning
          real Claude API calls or waiting for real rate limits.
        type: string
        default: success
      attempt:
        description: |
          1-based retry attempt counter. Reusable workflows callers pass this
          on retry-dispatch (or always default to 1). Drives retry-policy caps
          in retry-dispatch.sh.
        type: number
        default: 1
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: OAuth token for Claude Code (generated via `claude setup-token`).
        required: true
    outputs:
      outcome:
        description: '"success" or "failed".'
        value: ${{ jobs.implement.outputs.outcome }}
      cost-usd:
        description: Total Claude API cost in USD for this run.
        value: ${{ jobs.implement.outputs.cost-usd }}
      num-turns:
        description: Number of conversation turns the run took.
        value: ${{ jobs.implement.outputs.num-turns }}
      failure-class:
        description: 'Failure bucket from classify-failure.sh (success | rate_limit | api_auth | transient | task_failure | bug).'
        value: ${{ jobs.implement.outputs.failure-class }}
      retry-decision:
        description: '"retry" or "stop" from retry-dispatch.sh. Empty when class=success (retry-dispatch is skipped).'
        value: ${{ jobs.implement.outputs.retry-decision }}

permissions:
  contents: read

concurrency:
  group: claude-implement-${{ github.repository }}-${{ inputs.issue-number }}
  cancel-in-progress: true

jobs:
  implement:
    name: Implement issue #${{ inputs.issue-number }}
    runs-on: ${{ fromJSON(inputs.runner-labels) }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      outcome:        ${{ steps.outputs.outputs.outcome }}
      cost-usd:       ${{ steps.outputs.outputs.cost-usd }}
      num-turns:      ${{ steps.outputs.outputs.num-turns }}
      failure-class:  ${{ steps.classify_failure.outputs.class }}
      retry-decision: ${{ steps.retry.outputs.decision }}
    steps:
      - name: Checkout consumer repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Checkout claude-pipeline scripts
        if: ${{ !inputs.local-scripts }}
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: ${{ inputs.pipeline-repo }}
          ref: ${{ inputs.pipeline-ref }}
          path: .claude-pipeline
          sparse-checkout: |
            scripts
            tests/mocks

      - name: Mirror local scripts to .claude-pipeline (self-test mode)
        if: ${{ inputs.local-scripts }}
        run: |
          mkdir -p .claude-pipeline/scripts .claude-pipeline/tests/mocks
          cp -r scripts/. .claude-pipeline/scripts/
          if [[ -d tests/mocks ]]; then
            cp -r tests/mocks/. .claude-pipeline/tests/mocks/
          fi

      - name: Ensure toolchain
        run: bash .claude-pipeline/scripts/ensure-toolchain.sh

      - name: Fetch issue context
        if: ${{ !inputs.stub-claude }}
        id: issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
        run: |
          prompt_file="${RUNNER_TEMP:-/tmp}/claude-prompt.md"
          ctx=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json title,body --jq '"# " + .title + "\n\n" + .body')
          {
            printf '# Issue #%s\n\n%s\n\n---\n\n' "$ISSUE_NUMBER" "$ctx"
            printf 'Read CLAUDE.md and follow the house rules.\n'
            printf 'Implement the change on a new branch and open a DRAFT pull request.\n'
          } > "$prompt_file"
          echo "prompt-file=$prompt_file" >> "$GITHUB_OUTPUT"

      - name: Triage model
        if: ${{ !inputs.stub-claude }}
        id: triage
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          DEFAULT_MODEL: ${{ inputs.default-model }}
        run: bash .claude-pipeline/scripts/classify-task.sh

      - name: Run Claude Code
        if: ${{ !inputs.stub-claude }}
        id: claude_run
        uses: anthropics/claude-code-base-action@e8132bc5e637a42c27763fc757faa37e1ee43b34  # v0.0.63
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt_file: ${{ steps.issue.outputs.prompt-file }}
          model: ${{ steps.triage.outputs.model }}
          max_turns: '30'
          # Headless mode has no human in the loop to approve tool use, so
          # everything Claude needs to implement an issue must be allowlisted
          # up front: code changes, search, repo operations, branch + PR.
          allowed_tools: Edit,Write,Read,Glob,Grep,MultiEdit,TodoWrite,Bash
          # Expose GH_TOKEN to the spawned `claude` subprocess so it can call
          # `gh pr create` (the action only injects CLAUDE_CODE_OAUTH_TOKEN
          # by default).
          claude_env: |
            GH_TOKEN=${{ github.token }}

      - name: Stub Claude run (diagnostic mode)
        if: ${{ inputs.stub-claude }}
        id: stub_run
        env:
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          DEFAULT_MODEL: ${{ inputs.default-model }}
          STUB_FIXTURE: ${{ inputs.stub-fixture }}
        run: |
          out="${RUNNER_TEMP:-/tmp}/claude-result.json"
          case "$STUB_FIXTURE" in
            success)
              jq -nc --argjson issue "$ISSUE_NUMBER" --arg model "$DEFAULT_MODEL" \
                '{type:"result",subtype:"success",is_error:false,duration_ms:1500,num_turns:1,total_cost_usd:0,session_id:"stub",result:("Stub success for issue #" + ($issue|tostring) + " (model " + $model + ")."),usage:{input_tokens:0,output_tokens:0,cache_creation_input_tokens:0,cache_read_input_tokens:0}}' > "$out"
              ;;
            rate_limit)
              jq -nc '{type:"result",subtype:"error_during_execution",is_error:true,duration_ms:5000,num_turns:2,total_cost_usd:0,session_id:"stub-rl",result:"API Error: 429 rate_limit_error — Please retry after 2026-04-29T20:00:00Z.",usage:{input_tokens:0,output_tokens:0,cache_creation_input_tokens:0,cache_read_input_tokens:0}}' > "$out"
              ;;
            task_failure)
              jq -nc '{type:"result",subtype:"error_max_turns",is_error:true,duration_ms:300000,num_turns:30,total_cost_usd:0,session_id:"stub-mt",result:"Reached max_turns before completion.",usage:{input_tokens:0,output_tokens:0,cache_creation_input_tokens:0,cache_read_input_tokens:0}}' > "$out"
              ;;
            *)
              echo "::error::unknown stub-fixture: $STUB_FIXTURE"; exit 2
              ;;
          esac
          echo "result-file=$out" >> "$GITHUB_OUTPUT"

      - name: Adapt execution_file -> result.json
        if: ${{ !inputs.stub-claude && always() && steps.claude_run.outputs.execution_file != '' }}
        id: claude
        env:
          EXECUTION_FILE: ${{ steps.claude_run.outputs.execution_file }}
        run: |
          out="${RUNNER_TEMP:-/tmp}/claude-result.json"
          # execution_file may be a JSON array (current action behavior) or NDJSON
          # (older). Detect and pick the right jq invocation either way.
          if jq -e 'type == "array"' "$EXECUTION_FILE" >/dev/null 2>&1; then
            jq    'map(select(.type == "result")) | last' "$EXECUTION_FILE" > "$out"
          else
            jq -s 'map(select(.type == "result")) | last' "$EXECUTION_FILE" > "$out"
          fi
          echo "result-file=$out" >> "$GITHUB_OUTPUT"
          echo "execution-file=$EXECUTION_FILE" >> "$GITHUB_OUTPUT"

      - name: Classify failure
        id: classify_failure
        if: always() && (steps.claude.outputs.result-file != '' || steps.stub_run.outputs.result-file != '')
        env:
          RESULT_FILE: ${{ steps.claude.outputs.result-file || steps.stub_run.outputs.result-file }}
        run: bash .claude-pipeline/scripts/classify-failure.sh

      - name: Plan retry
        id: retry
        if: always() && steps.classify_failure.outputs.class != '' && steps.classify_failure.outputs.class != 'success'
        env:
          CLASS: ${{ steps.classify_failure.outputs.class }}
          ATTEMPT: ${{ inputs.attempt }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          # Stub runs are tests — never auto-redispatch. Real runs follow
          # the classify+retry policy: rate_limit/transient/task_failure
          # may trigger an actual `gh workflow run` against the consumer's
          # claude.yml (which now accepts workflow_dispatch).
          DRY_RUN: ${{ inputs.stub-claude && '1' || '0' }}
        run: bash .claude-pipeline/scripts/retry-dispatch.sh

      - name: Extract job outputs from result.json
        id: outputs
        if: always() && (steps.claude.outputs.result-file != '' || steps.stub_run.outputs.result-file != '')
        env:
          RESULT_FILE: ${{ steps.claude.outputs.result-file || steps.stub_run.outputs.result-file }}
        run: |
          jq -r '
            "cost-usd="  + (.total_cost_usd | tostring),
            "num-turns=" + (.num_turns      | tostring),
            "outcome="   + (if .is_error then "failed" else "success" end)
          ' "$RESULT_FILE" >> "$GITHUB_OUTPUT"

      - name: Ensure issue labels exist
        if: always() && !inputs.dry-run
        env:
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: bash .claude-pipeline/scripts/ensure-issue-labels.sh

      - name: Post run report
        if: always() && (steps.claude.outputs.result-file != '' || steps.stub_run.outputs.result-file != '')
        env:
          RESULT_FILE: ${{ steps.claude.outputs.result-file || steps.stub_run.outputs.result-file }}
          EXECUTION_FILE: ${{ steps.claude.outputs.execution-file }}
          ISSUE_NUMBER: ${{ inputs.issue-number }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          RENDER_ONLY: ${{ inputs.dry-run && '1' || '0' }}
        run: bash .claude-pipeline/scripts/post-run-report.sh
