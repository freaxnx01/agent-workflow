name: claude-implement-test

# Layer-2 test for the reusable workflow. Calls claude-implement.yml with
# `dry-run: true` so the post-run-report step renders to stdout instead of
# touching the GitHub API. Designed to be runnable both in CI on every PR
# that touches the pipeline, and locally via `act`.

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/claude-implement.yml
      - .github/workflows/claude-implement.test.yml
      - scripts/**
      - tests/**

permissions:
  # Match the elevated permissions the called claude-implement.yml job
  # declares; a caller granting less than the callee requests causes
  # GitHub to reject the workflow at load (silent startup_failure,
  # root cause of #34).
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: claude-implement-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  call-success:
    name: Reusable workflow — stub success
    uses: ./.github/workflows/claude-implement.yml
    with:
      issue-number: 9001
      default-model: claude-sonnet-4-6
      timeout-minutes: 10
      dry-run: true
      local-scripts: true
      stub-claude: true
      stub-fixture: success
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: not-used-by-stub

  call-rate-limit:
    name: Reusable workflow — stub rate-limit (retry path)
    uses: ./.github/workflows/claude-implement.yml
    with:
      issue-number: 9002
      default-model: claude-sonnet-4-6
      timeout-minutes: 10
      dry-run: true
      local-scripts: true
      stub-claude: true
      stub-fixture: rate_limit
      attempt: 1
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: not-used-by-stub

  call-opencode-success:
    name: Reusable workflow — opencode success
    uses: ./.github/workflows/claude-implement.yml
    with:
      issue-number: 9011
      default-model: mistralai/codestral-latest
      timeout-minutes: 10
      dry-run: true
      local-scripts: true
      stub-claude: true
      stub-fixture: opencode_success
      agent: opencode
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: not-used-by-stub

  call-opencode-rate-limit:
    name: Reusable workflow — opencode rate-limit
    uses: ./.github/workflows/claude-implement.yml
    with:
      issue-number: 9012
      default-model: mistralai/mistral-large-latest
      timeout-minutes: 10
      dry-run: true
      local-scripts: true
      stub-claude: true
      stub-fixture: opencode_rate_limit
      agent: opencode
      attempt: 1
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: not-used-by-stub

  call-opencode-task-failure:
    name: Reusable workflow — opencode task-failure (max-turns)
    uses: ./.github/workflows/claude-implement.yml
    with:
      issue-number: 9013
      default-model: mistralai/codestral-latest
      timeout-minutes: 10
      dry-run: true
      local-scripts: true
      stub-claude: true
      stub-fixture: opencode_task_failure
      agent: opencode
      attempt: 1
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: not-used-by-stub

  verify-success:
    name: Assert success path
    needs: call-success
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      OUTCOME:   ${{ needs.call-success.outputs.outcome }}
      COST_USD:  ${{ needs.call-success.outputs.cost-usd }}
      NUM_TURNS: ${{ needs.call-success.outputs.num-turns }}
      FAILURE:   ${{ needs.call-success.outputs.failure-class }}
      RETRY:     ${{ needs.call-success.outputs.retry-decision }}
    steps:
      - name: Assert stub produced expected outputs
        run: |
          fail=0
          [[ "$OUTCOME" == "success" ]]    || { echo "::error::outcome=$OUTCOME (want success)"; fail=1; }
          [[ "$COST_USD" == "0" ]]         || { echo "::error::cost-usd=$COST_USD (want 0)"; fail=1; }
          [[ "$NUM_TURNS" == "1" ]]        || { echo "::error::num-turns=$NUM_TURNS (want 1)"; fail=1; }
          [[ "$FAILURE" == "success" ]]    || { echo "::error::failure-class=$FAILURE (want success)"; fail=1; }
          [[ -z "$RETRY" ]]                || { echo "::error::retry-decision=$RETRY (want empty — no retry on success)"; fail=1; }
          (( fail == 0 )) || exit 1
          echo "success path OK: failure=$FAILURE retry=$RETRY"

  verify-rate-limit:
    name: Assert rate-limit path
    needs: call-rate-limit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      OUTCOME:  ${{ needs.call-rate-limit.outputs.outcome }}
      FAILURE:  ${{ needs.call-rate-limit.outputs.failure-class }}
      RETRY:    ${{ needs.call-rate-limit.outputs.retry-decision }}
    steps:
      - name: Assert rate-limit triggers retry decision
        run: |
          fail=0
          [[ "$OUTCOME" == "failed" ]]      || { echo "::error::outcome=$OUTCOME (want failed)"; fail=1; }
          [[ "$FAILURE" == "rate_limit" ]]  || { echo "::error::failure-class=$FAILURE (want rate_limit)"; fail=1; }
          [[ "$RETRY" == "retry" ]]         || { echo "::error::retry-decision=$RETRY (want retry)"; fail=1; }
          (( fail == 0 )) || exit 1
          echo "rate-limit path OK: failure=$FAILURE retry=$RETRY"

  verify-opencode-success:
    name: Assert opencode success path
    needs: call-opencode-success
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      OUTCOME:   ${{ needs.call-opencode-success.outputs.outcome }}
      COST_USD:  ${{ needs.call-opencode-success.outputs.cost-usd }}
      NUM_TURNS: ${{ needs.call-opencode-success.outputs.num-turns }}
      FAILURE:   ${{ needs.call-opencode-success.outputs.failure-class }}
      RETRY:     ${{ needs.call-opencode-success.outputs.retry-decision }}
    steps:
      - name: Assert opencode success outputs
        run: |
          fail=0
          [[ "$OUTCOME" == "success" ]]      || { echo "::error::outcome=$OUTCOME (want success)"; fail=1; }
          [[ "$COST_USD" == "0.0035" ]]      || { echo "::error::cost-usd=$COST_USD (want 0.0035 from the opencode fixture)"; fail=1; }
          [[ "$NUM_TURNS" == "4" ]]          || { echo "::error::num-turns=$NUM_TURNS (want 4)"; fail=1; }
          [[ "$FAILURE" == "success" ]]      || { echo "::error::failure-class=$FAILURE (want success)"; fail=1; }
          [[ -z "$RETRY" ]]                  || { echo "::error::retry-decision=$RETRY (want empty — no retry on success)"; fail=1; }
          (( fail == 0 )) || exit 1
          echo "opencode-success OK: cost=$COST_USD turns=$NUM_TURNS"

  verify-opencode-rate-limit:
    name: Assert opencode rate-limit path
    needs: call-opencode-rate-limit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      OUTCOME:  ${{ needs.call-opencode-rate-limit.outputs.outcome }}
      FAILURE:  ${{ needs.call-opencode-rate-limit.outputs.failure-class }}
      RETRY:    ${{ needs.call-opencode-rate-limit.outputs.retry-decision }}
    steps:
      - name: Assert opencode rate-limit triggers retry decision
        run: |
          fail=0
          [[ "$OUTCOME" == "failed" ]]      || { echo "::error::outcome=$OUTCOME (want failed)"; fail=1; }
          [[ "$FAILURE" == "rate_limit" ]]  || { echo "::error::failure-class=$FAILURE (want rate_limit)"; fail=1; }
          [[ "$RETRY" == "retry" ]]         || { echo "::error::retry-decision=$RETRY (want retry)"; fail=1; }
          (( fail == 0 )) || exit 1
          echo "opencode-rate-limit OK: failure=$FAILURE retry=$RETRY"

  verify-opencode-task-failure:
    name: Assert opencode task-failure path
    needs: call-opencode-task-failure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      OUTCOME:   ${{ needs.call-opencode-task-failure.outputs.outcome }}
      NUM_TURNS: ${{ needs.call-opencode-task-failure.outputs.num-turns }}
      FAILURE:   ${{ needs.call-opencode-task-failure.outputs.failure-class }}
      RETRY:     ${{ needs.call-opencode-task-failure.outputs.retry-decision }}
    steps:
      - name: Assert opencode max-turns is bucketed as task_failure
        run: |
          fail=0
          [[ "$OUTCOME" == "failed" ]]         || { echo "::error::outcome=$OUTCOME (want failed)"; fail=1; }
          [[ "$NUM_TURNS" == "30" ]]           || { echo "::error::num-turns=$NUM_TURNS (want 30)"; fail=1; }
          [[ "$FAILURE" == "task_failure" ]]   || { echo "::error::failure-class=$FAILURE (want task_failure)"; fail=1; }
          # task_failure retries at most once; with attempt=1 → retry, but
          # don't pin the retry decision since #6 may change defaults
          (( fail == 0 )) || exit 1
          echo "opencode-task-failure OK: failure=$FAILURE retry=$RETRY"

  # ─── Auto-review path (issue #16) ─────────────────────────────────────────
  # Four calls drive the auto_review job through every verdict/envelope
  # branch. The PATH-shimmed gh mock captures `gh pr merge` calls so the
  # `merge-attempted` output asserts "no real merge under act".

  call-auto-review-approve-safe:
    name: Reusable workflow — auto-review approve + safe envelope
    uses: ./.github/workflows/claude-implement.yml
    with:
      issue-number: 9003
      timeout-minutes: 10
      local-scripts: true
      stub-claude: true
      stub-fixture: success
      auto-review: true
      dry-run: true
      stub-auto-review-enabled: true
      stub-review-verdict: approve
      stub-pr-files: |
        src/foo.ts
        tests/foo.test.ts
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: not-used-by-stub

  call-auto-review-approve-unsafe-github:
    name: Reusable workflow — auto-review approve + .github/ touch (envelope blocks)
    uses: ./.github/workflows/claude-implement.yml
    with:
      issue-number: 9004
      timeout-minutes: 10
      local-scripts: true
      stub-claude: true
      stub-fixture: success
      auto-review: true
      dry-run: true
      stub-auto-review-enabled: true
      stub-review-verdict: approve
      stub-pr-files: |
        src/foo.ts
        .github/workflows/foo.yml
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: not-used-by-stub

  call-auto-review-request-changes:
    name: Reusable workflow — auto-review request_changes
    uses: ./.github/workflows/claude-implement.yml
    with:
      issue-number: 9005
      timeout-minutes: 10
      local-scripts: true
      stub-claude: true
      stub-fixture: success
      auto-review: true
      dry-run: true
      stub-auto-review-enabled: true
      stub-review-verdict: request_changes
      stub-pr-files: |
        src/foo.ts
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: not-used-by-stub

  call-auto-review-block:
    name: Reusable workflow — auto-review block
    uses: ./.github/workflows/claude-implement.yml
    with:
      issue-number: 9006
      timeout-minutes: 10
      local-scripts: true
      stub-claude: true
      stub-fixture: success
      auto-review: true
      dry-run: true
      stub-auto-review-enabled: true
      stub-review-verdict: block
      stub-pr-files: |
        src/foo.ts
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: not-used-by-stub

  # ─── Pre-preview path (issue #77 / ADR-004) ───────────────────────────────
  # Pre-preview reviews the draft PR and, on approve, runs `gh pr ready`
  # (promote) but never `gh pr merge`. The gh mock captures both so the
  # asserts can check ready=true / merge=false on approve, and both=false
  # on block. The precedence call sets BOTH gates; pre-preview must win.

  call-pre-preview-approve:
    name: Reusable workflow — pre-preview approve
    uses: ./.github/workflows/claude-implement.yml
    with:
      issue-number: 9007
      timeout-minutes: 10
      local-scripts: true
      stub-claude: true
      stub-fixture: success
      pre-preview: true
      dry-run: true
      stub-pre-preview-enabled: true
      stub-review-verdict: approve
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: not-used-by-stub

  call-pre-preview-block:
    name: Reusable workflow — pre-preview block
    uses: ./.github/workflows/claude-implement.yml
    with:
      issue-number: 9008
      timeout-minutes: 10
      local-scripts: true
      stub-claude: true
      stub-fixture: success
      pre-preview: true
      dry-run: true
      stub-pre-preview-enabled: true
      stub-review-verdict: block
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: not-used-by-stub

  call-pre-preview-precedence:
    name: Reusable workflow — pre-preview wins over auto-review
    uses: ./.github/workflows/claude-implement.yml
    with:
      issue-number: 9009
      timeout-minutes: 10
      local-scripts: true
      stub-claude: true
      stub-fixture: success
      auto-review: true
      pre-preview: true
      dry-run: true
      stub-auto-review-enabled: true
      stub-pre-preview-enabled: true
      stub-review-verdict: approve
      stub-pr-files: |
        src/foo.ts
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: not-used-by-stub

  verify-auto-review-approve-safe:
    name: Assert approve + safe → merge attempted
    needs: call-auto-review-approve-safe
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      ATTEMPTED: ${{ needs.call-auto-review-approve-safe.outputs.auto-review-merge-attempted }}
    steps:
      - name: Assert gh pr merge was attempted (against the mock, not real GitHub)
        run: |
          [[ "$ATTEMPTED" == "true" ]] \
            || { echo "::error::merge-attempted=$ATTEMPTED (want true)"; exit 1; }
          echo "approve+safe OK: merge-attempted=$ATTEMPTED"

  verify-auto-review-approve-unsafe-github:
    name: Assert approve + .github/ touch → envelope blocks, no merge attempted
    needs: call-auto-review-approve-unsafe-github
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      ATTEMPTED: ${{ needs.call-auto-review-approve-unsafe-github.outputs.auto-review-merge-attempted }}
    steps:
      - name: Assert gh pr merge was NOT attempted
        run: |
          [[ "$ATTEMPTED" == "false" ]] \
            || { echo "::error::merge-attempted=$ATTEMPTED (want false — .github/ touch must block)"; exit 1; }
          echo "approve+unsafe(.github/) OK: merge-attempted=$ATTEMPTED"

  verify-auto-review-request-changes:
    name: Assert request_changes → no merge attempted
    needs: call-auto-review-request-changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      ATTEMPTED: ${{ needs.call-auto-review-request-changes.outputs.auto-review-merge-attempted }}
    steps:
      - name: Assert gh pr merge was NOT attempted
        run: |
          [[ "$ATTEMPTED" == "false" ]] \
            || { echo "::error::merge-attempted=$ATTEMPTED (want false — request_changes must block)"; exit 1; }
          echo "request_changes OK: merge-attempted=$ATTEMPTED"

  verify-auto-review-block:
    name: Assert block → no merge attempted
    needs: call-auto-review-block
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      ATTEMPTED: ${{ needs.call-auto-review-block.outputs.auto-review-merge-attempted }}
    steps:
      - name: Assert gh pr merge was NOT attempted
        run: |
          [[ "$ATTEMPTED" == "false" ]] \
            || { echo "::error::merge-attempted=$ATTEMPTED (want false — block verdict must block)"; exit 1; }
          echo "block OK: merge-attempted=$ATTEMPTED"

  verify-pre-preview-approve:
    name: Assert pre-preview approve → promoted, no merge
    needs: call-pre-preview-approve
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      READY:     ${{ needs.call-pre-preview-approve.outputs.pre-preview-ready-attempted }}
      ATTEMPTED: ${{ needs.call-pre-preview-approve.outputs.pre-preview-merge-attempted }}
    steps:
      - name: Assert gh pr ready called and gh pr merge NOT called
        run: |
          fail=0
          [[ "$READY" == "true" ]]      || { echo "::error::ready-attempted=$READY (want true — approve must promote)"; fail=1; }
          [[ "$ATTEMPTED" == "false" ]] || { echo "::error::merge-attempted=$ATTEMPTED (want false — pre-preview never merges)"; fail=1; }
          (( fail == 0 )) || exit 1
          echo "pre-preview approve OK: ready=$READY merge=$ATTEMPTED"

  verify-pre-preview-block:
    name: Assert pre-preview block → draft, no promote, no merge
    needs: call-pre-preview-block
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      READY:     ${{ needs.call-pre-preview-block.outputs.pre-preview-ready-attempted }}
      ATTEMPTED: ${{ needs.call-pre-preview-block.outputs.pre-preview-merge-attempted }}
    steps:
      - name: Assert neither gh pr ready nor gh pr merge was called
        run: |
          fail=0
          [[ "$READY" == "false" ]]     || { echo "::error::ready-attempted=$READY (want false — block must NOT promote)"; fail=1; }
          [[ "$ATTEMPTED" == "false" ]] || { echo "::error::merge-attempted=$ATTEMPTED (want false)"; fail=1; }
          (( fail == 0 )) || exit 1
          echo "pre-preview block OK: ready=$READY merge=$ATTEMPTED"

  verify-pre-preview-precedence:
    name: Assert pre-preview wins → promoted, no merge
    needs: call-pre-preview-precedence
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    env:
      READY:           ${{ needs.call-pre-preview-precedence.outputs.pre-preview-ready-attempted }}
      PREVIEW_MERGE:   ${{ needs.call-pre-preview-precedence.outputs.pre-preview-merge-attempted }}
      AUTO_MERGE:      ${{ needs.call-pre-preview-precedence.outputs.auto-review-merge-attempted }}
    steps:
      - name: Assert pre-preview ran and nothing auto-merged
        run: |
          fail=0
          [[ "$READY" == "true" ]]          || { echo "::error::ready-attempted=$READY (want true — pre-preview should run and promote)"; fail=1; }
          [[ "$PREVIEW_MERGE" == "false" ]] || { echo "::error::pre-preview-merge-attempted=$PREVIEW_MERGE (want false)"; fail=1; }
          [[ "$AUTO_MERGE" != "true" ]]     || { echo "::error::auto-review-merge-attempted=$AUTO_MERGE (want not-true — auto_review must be suppressed)"; fail=1; }
          (( fail == 0 )) || exit 1
          echo "precedence OK: ready=$READY preview-merge=$PREVIEW_MERGE auto-merge=$AUTO_MERGE"
