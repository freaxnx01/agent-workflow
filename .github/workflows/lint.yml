name: lint

# Polyglot lint gate via pre-commit (actionlint, yamllint, shellcheck, ruff,
# markdownlint, hadolint, typos, gitleaks, hygiene). Replaces the standalone
# actionlint + shellcheck jobs — the pre-commit config covers both and more.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install pre-commit
        run: python -m pip install --disable-pip-version-check pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure
