name: lint

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      ACTIONLINT_VERSION: 1.7.12
      ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Install actionlint
        run: |
          tarball="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl -fsSLO "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${tarball}"
          printf '%s  %s\n' "${ACTIONLINT_SHA256}" "${tarball}" | sha256sum -c -
          tar -xzf "${tarball}" actionlint

      - name: Run actionlint
        run: ./actionlint -color

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Run shellcheck
        run: |
          mapfile -t files < <(find scripts tests -type f -name '*.sh' 2>/dev/null | sort)
          [[ ${#files[@]} -gt 0 ]] || { echo "No shell scripts yet — skipping."; exit 0; }
          shellcheck -x -e SC1091 "${files[@]}"
