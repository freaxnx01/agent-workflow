# typos allowlist — words this repo uses intentionally that typos would flag.
# "unparseable" is a valid word used in fixtures and a regression test (#58);
# do not "correct" it to "unparsable".
[default.extend-words]
unparseable = "unparseable"

[default]
# Git SHAs in docs are hex, not prose: `ba94ff4` tripped "ba → by/be" when the
# merge commits for #132/#46 were recorded in docs/TODO.md. Scoped to
# backtick-wrapped hex so it cannot mask a real typo in ordinary text — an
# allowlist entry per SHA would grow without bound.
extend-ignore-re = ["`[0-9a-f]{7,40}`"]
